version: "3.9"

services:
  # ── MariaDB ──────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: campus_ai_db
      MYSQL_USER: campus_ai_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "3307:3306"   # expose on 3307 to avoid conflict with host MySQL
    healthcheck:
      test: ["CMD", "mariadb", "-u", "campus_ai_user", "-p${DB_PASSWORD:-changeme}", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      # Override DATABASE_URL to point at the Docker service name
      DATABASE_URL: "mysql+pymysql://${DB_USER:-campus_ai_user}:${DB_PASSWORD:-changeme}@db:3306/campus_ai_db?charset=utf8mb4"
      OLLAMA_HOST: http://host.docker.internal:11434  # Ollama runs on host
      LOG_FILE: /app/logs/backend.log
    volumes:
      - ./logs:/app/logs
      - ./backend/vector_store:/app/vector_store
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Vite Frontend (widget) ────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./Frontend/web_interface:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000

  # ── App Interface (companion React app) ───────────────────────────────────
  app_interface:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./Frontend/app_interface:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  db_data:

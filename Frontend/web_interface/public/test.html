<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        button:hover { background: #45a049; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Quick Connection Test</h1>
        <p>This test bypasses your React app's cache.</p>
        
        <button onclick="testConnection()">🚀 Test Connection</button>
        <button onclick="testChat()">💬 Test Chat</button>
        <button onclick="location.reload()">🔄 Refresh</button>
        
        <div id="result"></div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');

        function showResult(message, type = 'info') {
            resultDiv.className = type;
            resultDiv.textContent = message;
        }

        async function testConnection() {
            showResult('Testing connection to backend...\n', 'info');
            
            try {
                // Test using the proxy (relative URL)
                const response = await fetch('/api/v1/chat/test', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showResult(
                        '✅ SUCCESS!\n\n' +
                        'Backend is reachable via proxy.\n\n' +
                        'Response:\n' + JSON.stringify(data, null, 2),
                        'success'
                    );
                } else {
                    showResult(
                        `❌ ERROR: ${response.status} ${response.statusText}\n\n` +
                        'Backend responded but with an error.',
                        'error'
                    );
                }
            } catch (error) {
                showResult(
                    `❌ CONNECTION FAILED\n\n` +
                    `Error: ${error.message}\n\n` +
                    `This means the proxy or backend is not working.`,
                    'error'
                );
            }
        }

        async function testChat() {
            showResult('Testing chat API...\n', 'info');
            
            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: 'hello' })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showResult(
                        '✅ CHAT WORKING!\n\n' +
                        'Response from AI:\n' + data.response,
                        'success'
                    );
                } else {
                    const text = await response.text();
                    showResult(
                        `❌ CHAT ERROR: ${response.status}\n\n${text}`,
                        'error'
                    );
                }
            } catch (error) {
                showResult(
                    `❌ CHAT FAILED\n\nError: ${error.message}`,
                    'error'
                );
            }
        }

        // Auto-run on load
        window.addEventListener('load', testConnection);
    </script>
</body>
</html>
